apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: harbor-pull-secret
  namespace: embedded-api
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: harbor-registry-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      mergePolicy: Replace
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "harbor.prod.skatzi.com": {
                "username": "{{ .username }}",
                "password": "{{ .password }}",
                "auth": "{{ printf "%s:%s" .username .password | b64enc }}"
              }
            }
          }
  data:
    - secretKey: username
      remoteRef:
        key: hetzner-mgmt/embedded-api/harbor-pull-secret
        property: username
    - secretKey: password
      remoteRef:
        key: hetzner-mgmt/embedded-api/harbor-pull-secret
        property: password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-secrets
  namespace: embedded-api
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: oauth2-proxy-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: client-id
      remoteRef:
        key: hetzner-mgmt/embedded-api/keycloak-oidc
        property: client-id
    - secretKey: client-secret
      remoteRef:
        key: hetzner-mgmt/embedded-api/keycloak-oidc
        property: client-secret
    - secretKey: cookie-secret
      remoteRef:
        key: hetzner-mgmt/embedded-api/cookie-secret
        property: cookie-secret

