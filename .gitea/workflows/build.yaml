name: CI

on:
  push:
    branches: [main]

env:
  REGISTRY: harbor.prod.skatzi.com
  IMAGE: library/embedding-api
  GITEA_URL: https://gitea.prod.skatzi.com

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install --quiet ruff --break-system-packages
      - run: ruff check app/
      - run: ruff format --check app/

  build:
    runs-on: ubuntu-latest
    needs: lint
    container:
      image: harbor.prod.skatzi.com/library/kaniko-runner:latest
    steps:
      - name: Configure Harbor credentials
        env:
          HARBOR_AUTH: ${{ secrets.HARBOR_USERNAME }}:${{ secrets.HARBOR_PASSWORD }}
        run: |
          mkdir -p /kaniko/.docker
          printf '{"auths":{"%s":{"auth":"%s"}}}' \
            "$REGISTRY" \
            "$(printf '%s' "$HARBOR_AUTH" | base64)" \
            > /kaniko/.docker/config.json

      - name: Download build context
        env:
          TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          wget -q --no-check-certificate \
            --header "Authorization: token ${TOKEN}" \
            "${GITEA_URL}/api/v1/repos/${{ github.repository }}/archive/main.tar.gz" \
            -O /kaniko/context.tar.gz

      - name: Build and push
        run: |
          /kaniko/executor \
            --context "tar:///kaniko/context.tar.gz" \
            --context-sub-path "embedded-api" \
            --dockerfile Containerfile \
            --destination "$REGISTRY/$IMAGE:${{ github.sha }}" \
            --destination "$REGISTRY/$IMAGE:latest"

